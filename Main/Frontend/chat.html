<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatBot – Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS Variables (Dark / Light) ── */
    :root {
      --bg: #0d0f14; --surface: #151820; --surface2: #1c2030;
      --border: #252a35; --accent: #4f8ef7; --accent2: #7c5cfc;
      --text: #e8eaf0; --muted: #6b7280;
      --user-bubble: #1e3a5f; --bot-bubble: #1c2030;
      --radius: 12px;
    }
    body.light {
      --bg: #f0f2f8; --surface: #ffffff; --surface2: #f7f8fc;
      --border: #e2e6f0; --text: #1a1d2e; --muted: #8892a4;
      --user-bubble: #dbeafe; --bot-bubble: #f1f5fb;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg); color: var(--text);
      transition: background .3s, color .3s;
    }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; height: 100vh;
      transition: background .3s;
    }
    .sidebar-header {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 16px; border-bottom: 1px solid var(--border);
    }
    .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border-radius: 9px; display: grid; place-items: center; font-size: 17px; flex-shrink: 0; }
    .logo-text { font-size: 16px; font-weight: 700; }
    .sidebar-actions { padding: 12px; border-bottom: 1px solid var(--border); }
    .new-chat-btn {
      width: 100%; padding: 9px; border-radius: 10px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      border: none; color: #fff; font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .new-chat-btn:hover { opacity: .85; }

    /* sessions list */
    .sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item {
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      transition: background .15s; display: flex; align-items: center; gap: 8px;
      margin-bottom: 2px;
    }
    .session-item:hover  { background: var(--surface2); }
    .session-item.active { background: rgba(79,142,247,.15); }
    .session-item .s-icon { font-size: 14px; flex-shrink: 0; }
    .session-item .s-title { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .session-item .s-del { font-size: 11px; color: var(--muted); padding: 2px 6px; border-radius: 5px; opacity: 0; transition: opacity .15s; border: 1px solid var(--border); background: none; cursor: pointer; color: #f87171; }
    .session-item:hover .s-del { opacity: 1; }

    /* sidebar footer */
    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
    .footer-nav { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
    .footer-nav a {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-radius: 9px; font-size: 13px; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: background .15s, color .15s;
    }
    .footer-nav a:hover { background: var(--surface2); color: var(--text); }
    .user-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 10px; background: var(--surface2);
    }
    .avatar { width: 30px; height: 30px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .user-info { flex: 1; }
    .u-name { font-size: 12px; font-weight: 600; }
    .u-role { font-size: 10px; color: var(--accent); }
    .logout-btn { padding: 4px 8px; border-radius: 6px; background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.2); color: #f87171; font-size: 11px; cursor: pointer; font-family: inherit; }

    /* ── Chat Main ── */
    .chat-main { display: flex; flex-direction: column; height: 100vh; }

    /* Topbar */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .topbar-title { flex: 1; font-size: 15px; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .topbar-badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(74,222,128,.15); color: #4ade80; }

    /* icon buttons */
    .icon-btn {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 15px; cursor: pointer;
      display: grid; place-items: center; transition: background .15s, color .15s;
      font-family: inherit;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); }
    .icon-btn.active { background: rgba(79,142,247,.2); color: var(--accent); border-color: rgba(79,142,247,.3); }

    /* Lang selector */
    .lang-select {
      padding: 5px 10px; border-radius: 9px; font-size: 12px; font-weight: 600;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; cursor: pointer;
    }

    /* Export dropdown */
    .export-wrap { position: relative; }
    .export-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; display: none; z-index: 100;
      min-width: 130px; box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .export-menu.open { display: block; }
    .export-menu a {
      display: block; padding: 9px 14px; font-size: 13px;
      color: var(--text); text-decoration: none;
      transition: background .15s;
    }
    .export-menu a:hover { background: var(--surface2); }

    /* ── Messages area ── */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .messages-area::-webkit-scrollbar { width: 5px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      text-align: center; color: var(--muted);
    }
    .empty-icon { font-size: 52px; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .empty-sub   { font-size: 14px; max-width: 320px; line-height: 1.6; }
    .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .chip {
      padding: 7px 14px; border-radius: 20px; font-size: 13px;
      background: var(--surface2); border: 1px solid var(--border);
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* Message bubbles */
    .msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 75%; }
    .msg-row.user  { margin-left: auto; flex-direction: row-reverse; }
    .msg-row.bot   { margin-right: auto; }

    .bubble {
      padding: 11px 15px; border-radius: 16px; font-size: 14px;
      line-height: 1.6; word-break: break-word; max-width: 100%;
    }
    .msg-row.user .bubble  { background: var(--user-bubble); border-bottom-right-radius: 4px; }
    .msg-row.bot  .bubble  { background: var(--bot-bubble);  border-bottom-left-radius: 4px; border: 1px solid var(--border); }

    .msg-meta { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
    .msg-row.bot  .msg-meta { text-align: left; }
    .confidence-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      margin-right: 4px; vertical-align: middle;
    }
    .conf-high   { background: #4ade80; }
    .conf-medium { background: #fbbf24; }
    .conf-low    { background: #f87171; }

    /* Bot avatar */
    .bot-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--accent2)); display: grid; place-items: center; font-size: 13px; flex-shrink: 0; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 15px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 20px; border-top: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-wrap {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 14px; display: flex; align-items: flex-end;
      padding: 8px 12px; transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    textarea {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 14px;
      resize: none; line-height: 1.5; max-height: 120px; min-height: 24px;
    }
    textarea::placeholder { color: var(--muted); }
    .voice-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: none; border: none; color: var(--muted);
      font-size: 16px; cursor: pointer; flex-shrink: 0;
      transition: color .15s; display: grid; place-items: center;
    }
    .voice-btn:hover    { color: var(--accent); }
    .voice-btn.listening { color: #f87171; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    .send-btn {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      border: none; color: #fff; font-size: 17px; cursor: pointer;
      flex-shrink: 0; transition: opacity .2s, transform .1s;
      display: grid; place-items: center;
    }
    .send-btn:hover   { opacity: .85; }
    .send-btn:active  { transform: scale(.95); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* tts status */
    .tts-status { font-size: 11px; color: var(--accent); margin-top: 6px; min-height: 14px; }

    /* ── Scrollbar ── */
    .sessions-list::-webkit-scrollbar { width: 4px; }
    .sessions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">🤖</div>
      <span class="logo-text">ChatBot</span>
    </div>
    <div class="sidebar-actions">
      <button class="new-chat-btn" onclick="newSession()">＋ New Chat</button>
    </div>
    <div class="sessions-list" id="sessionsList">
      <!-- injected by JS -->
    </div>
    <div class="sidebar-footer">
      <div class="footer-nav">
        <a href="dashboard.html" id="adminLink" style="display:none">📊 Admin Dashboard</a>
        <a href="settings.html">⚙️ Settings</a>
      </div>
      <div class="user-row">
        <div class="avatar" id="avatarInitial">U</div>
        <div class="user-info">
          <div class="u-name"  id="sidebarUser">User</div>
          <div class="u-role" id="sidebarRole">Member</div>
        </div>
        <button class="logout-btn" onclick="logout()">Out</button>
      </div>
    </div>
  </aside>

  <!-- ── Chat Main ── -->
  <div class="chat-main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">New Chat</div>
      <span class="topbar-badge">● Online</span>

      <select class="lang-select" id="langSelect" onchange="onLangChange()">
        <option value="en">🇺🇸 EN</option>
        <option value="hi">🇮🇳 HI</option>
      </select>

      <!-- Dark mode toggle -->
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>

      <!-- TTS toggle -->
      <button class="icon-btn" id="ttsBtn" onclick="toggleTTS()" title="Voice output">🔇</button>

      <!-- Export -->
      <div class="export-wrap">
        <button class="icon-btn" onclick="toggleExportMenu()" title="Export chat">⬇️</button>
        <div class="export-menu" id="exportMenu">
          <a href="#" onclick="exportChat('txt')">📄 Export TXT</a>
          <a href="#" onclick="exportChat('pdf')">📑 Export PDF</a>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🤖</div>
        <div class="empty-title">Hi! I'm ChatBot</div>
        <div class="empty-sub">Ask me anything — in English or Hindi. I use fuzzy matching to understand you!</div>
        <div class="suggestion-chips">
          <div class="chip" onclick="sendSuggestion('Hello!')">👋 Hello!</div>
          <div class="chip" onclick="sendSuggestion('Tell me a joke')">😄 Tell me a joke</div>
          <div class="chip" onclick="sendSuggestion('What can you do?')">❓ What can you do?</div>
          <div class="chip" onclick="sendSuggestion('Motivate me')">💪 Motivate me</div>
          <div class="chip" onclick="sendSuggestion('What is Python?')">🐍 What is Python?</div>
          <div class="chip" onclick="sendSuggestion('नमस्ते')">🇮🇳 नमस्ते</div>
        </div>
      </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="msgInput" rows="1" placeholder="Type a message…"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice input">🎤</button>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="tts-status" id="ttsStatus"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG & STATE
═══════════════════════════════════════════════════════════ */
const API      = 'http://localhost:8000';
const token    = localStorage.getItem('token');
const role     = localStorage.getItem('role');
const username = localStorage.getItem('username');

if (!token) window.location.href = 'login.html';

let currentSessionId = null;
let language         = localStorage.getItem('chatLang') || 'en';
let ttsEnabled       = localStorage.getItem('ttsEnabled') === 'true';
let recognition      = null;
let isListening      = false;
let isSending        = false;

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
(function init() {
  // Apply saved theme
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '☀️';
  }

  // User info
  document.getElementById('sidebarUser').textContent   = username || 'User';
  document.getElementById('avatarInitial').textContent = (username || 'U')[0].toUpperCase();
  document.getElementById('sidebarRole').textContent   = role === 'admin' ? 'Administrator' : 'Member';
  if (role === 'admin') document.getElementById('adminLink').style.display = 'flex';

  // Language
  document.getElementById('langSelect').value = language;

  // TTS button state
  document.getElementById('ttsBtn').textContent = ttsEnabled ? '🔊' : '🔇';

  // Load sessions
  loadSessions();

  // Setup speech recognition
  setupSpeechRecognition();
})();

/* ═══════════════════════════════════════════════════════════
   SESSIONS
═══════════════════════════════════════════════════════════ */
async function loadSessions() {
  try {
    const res      = await fetch(`${API}/chat/sessions`, { headers: authHeaders() });
    const sessions = await res.json();
    renderSessions(sessions);
  } catch { /* silently fail */ }
}

function renderSessions(sessions) {
  const list = document.getElementById('sessionsList');
  if (!sessions.length) {
    list.innerHTML = '<p style="padding:12px;font-size:12px;color:var(--muted);text-align:center">No chats yet</p>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentSessionId ? 'active' : ''}"
         id="si-${s.id}" onclick="loadSession(${s.id})">
      <span class="s-icon">💬</span>
      <span class="s-title">${escHtml(s.title)}</span>
      <button class="s-del" onclick="deleteSession(event,${s.id})">✕</button>
    </div>
  `).join('');
}

async function loadSession(id) {
  currentSessionId = id;
  try {
    const res     = await fetch(`${API}/chat/sessions/${id}`, { headers: authHeaders() });
    const session = await res.json();

    document.getElementById('topbarTitle').textContent = session.title;
    document.getElementById('emptyState').style.display = 'none';

    const area = document.getElementById('messagesArea');
    // Remove old messages (keep emptyState node)
    [...area.children].forEach(c => { if (c.id !== 'emptyState') c.remove(); });

    session.messages.forEach(m => appendBubble(m.sender, m.content, m.confidence, false));
    scrollBottom();
    loadSessions(); // refresh active highlight
  } catch { console.error('Load session failed'); }
}

function newSession() {
  currentSessionId = null;
  document.getElementById('topbarTitle').textContent = 'New Chat';
  const area = document.getElementById('messagesArea');
  [...area.children].forEach(c => { if (c.id !== 'emptyState') c.remove(); });
  document.getElementById('emptyState').style.display = 'flex';
  loadSessions();
}

async function deleteSession(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this chat?')) return;
  await fetch(`${API}/chat/sessions/${id}`, { method: 'DELETE', headers: authHeaders() });
  if (currentSessionId === id) newSession();
  else loadSessions();
}

/* ═══════════════════════════════════════════════════════════
   MESSAGING
═══════════════════════════════════════════════════════════ */
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || isSending) return;

  isSending = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  autoResize(input);
  document.getElementById('emptyState').style.display = 'none';

  // Optimistic user bubble
  appendBubble('user', text, 100, true);

  // Typing indicator
  const typingId = showTyping();

  try {
    const res  = await fetch(`${API}/chat/message`, {
      method : 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body   : JSON.stringify({ message: text, session_id: currentSessionId, language }),
    });
    const data = await res.json();

    removeTyping(typingId);

    if (!res.ok) { appendBubble('bot', '⚠️ Server error. Please try again.', 0, true); return; }

    currentSessionId = data.session_id;
    document.getElementById('topbarTitle').textContent = data.session_title;

    appendBubble('bot', data.bot_message.content, data.bot_message.confidence, true);

    if (ttsEnabled) speak(data.bot_message.content);
    loadSessions();
  } catch {
    removeTyping(typingId);
    appendBubble('bot', '⚠️ Cannot reach server. Is the backend running?', 0, true);
  } finally {
    isSending = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

function sendSuggestion(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

/* ═══════════════════════════════════════════════════════════
   BUBBLE RENDERING
═══════════════════════════════════════════════════════════ */
function appendBubble(sender, content, confidence, animate) {
  const area = document.getElementById('messagesArea');
  const row  = document.createElement('div');
  row.className = `msg-row ${sender}`;
  if (animate) row.style.animation = 'fadeIn .25s ease';

  const confClass = confidence >= 75 ? 'conf-high' : confidence >= 50 ? 'conf-medium' : 'conf-low';
  const timeStr   = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const escapedContent = escHtml(content).replace(/\n/g, '<br>');

  if (sender === 'bot') {
    row.innerHTML = `
      <div class="bot-avatar">🤖</div>
      <div>
        <div class="bubble">${escapedContent}</div>
        <div class="msg-meta">
          <span class="confidence-dot ${confClass}"></span>${confidence}% · ${timeStr}
        </div>
      </div>`;
  } else {
    row.innerHTML = `
      <div>
        <div class="bubble">${escapedContent}</div>
        <div class="msg-meta">${timeStr}</div>
      </div>`;
  }
  area.appendChild(row);
  scrollBottom();
}

function showTyping() {
  const area = document.getElementById('messagesArea');
  const div  = document.createElement('div');
  div.className = 'msg-row bot';
  div.id = 'typing-' + Date.now();
  div.innerHTML = `
    <div class="bot-avatar">🤖</div>
    <div class="bubble" style="padding:10px 15px">
      <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>`;
  area.appendChild(div);
  scrollBottom();
  return div.id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollBottom() {
  const area = document.getElementById('messagesArea');
  area.scrollTop = area.scrollHeight;
}

/* ═══════════════════════════════════════════════════════════
   VOICE INPUT (Web Speech API)
═══════════════════════════════════════════════════════════ */
function setupSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('voiceBtn').title = 'Voice input not supported in this browser';
    return;
  }
  recognition              = new SR();
  recognition.continuous   = false;
  recognition.interimResults = true;
  recognition.lang         = language === 'hi' ? 'hi-IN' : 'en-US';

  recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('msgInput').value = transcript;
    autoResize(document.getElementById('msgInput'));
  };

  recognition.onend  = () => { isListening = false; updateVoiceBtn(); };
  recognition.onerror = () => { isListening = false; updateVoiceBtn(); };
}

function toggleVoice() {
  if (!recognition) { alert('Speech recognition not supported in your browser.'); return; }
  if (isListening) { recognition.stop(); }
  else {
    recognition.lang = language === 'hi' ? 'hi-IN' : 'en-US';
    recognition.start();
    isListening = true;
  }
  updateVoiceBtn();
}

function updateVoiceBtn() {
  const btn = document.getElementById('voiceBtn');
  btn.textContent = isListening ? '🛑' : '🎤';
  btn.classList.toggle('listening', isListening);
}

/* ═══════════════════════════════════════════════════════════
   VOICE OUTPUT (Web Speech Synthesis)
═══════════════════════════════════════════════════════════ */
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  // Strip emojis for cleaner speech
  const clean = text.replace(/[\u{1F300}-\u{1FAFF}]/gu, '').trim();
  if (!clean) return;

  const utt  = new SpeechSynthesisUtterance(clean);
  utt.lang   = language === 'hi' ? 'hi-IN' : 'en-US';
  utt.rate   = 1.0;
  utt.pitch  = 1.0;

  const status = document.getElementById('ttsStatus');
  utt.onstart = () => { status.textContent = '🔊 Speaking…'; };
  utt.onend   = () => { status.textContent = ''; };
  utt.onerror = () => { status.textContent = ''; };

  window.speechSynthesis.speak(utt);
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  localStorage.setItem('ttsEnabled', ttsEnabled);
  document.getElementById('ttsBtn').textContent = ttsEnabled ? '🔊' : '🔇';
  if (!ttsEnabled) window.speechSynthesis?.cancel();
}

/* ═══════════════════════════════════════════════════════════
   EXPORT
═══════════════════════════════════════════════════════════ */
function toggleExportMenu() {
  document.getElementById('exportMenu').classList.toggle('open');
}

async function exportChat(format) {
  document.getElementById('exportMenu').classList.remove('open');
  if (!currentSessionId) { alert('No active chat to export.'); return; }
  const url = `${API}/chat/sessions/${currentSessionId}/export?format=${format}`;
  const res = await fetch(url, { headers: authHeaders() });
  if (!res.ok) { alert('Export failed.'); return; }
  const blob = await res.blob();
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `chat_${currentSessionId}.${format}`;
  a.click();
}

// Close export menu on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.export-wrap'))
    document.getElementById('exportMenu').classList.remove('open');
});

/* ═══════════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════════ */
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
}

/* ═══════════════════════════════════════════════════════════
   LANGUAGE
═══════════════════════════════════════════════════════════ */
function onLangChange() {
  language = document.getElementById('langSelect').value;
  localStorage.setItem('chatLang', language);
  if (recognition) recognition.lang = language === 'hi' ? 'hi-IN' : 'en-US';
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function authHeaders() { return { Authorization: `Bearer ${token}` }; }

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function logout() {
  window.speechSynthesis?.cancel();
  localStorage.clear();
  window.location.href = 'login.html';
}

// Add CSS for bubble fade-in
const style = document.createElement('style');
style.textContent = '@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}';
document.head.appendChild(style);
</script>
</body>
