<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatBot – Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #151820; --border: #252a35;
      --accent: #4f8ef7; --accent2: #7c5cfc;
      --text: #e8eaf0; --muted: #6b7280;
      --error: #f87171; --success: #4ade80; --radius: 12px;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 80% 20%, rgba(124,92,252,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 20% 80%, rgba(79,142,247,.10) 0%, transparent 60%);
      pointer-events: none;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 44px 40px;
      width: 100%; max-width: 440px;
      box-shadow: 0 0 60px rgba(124,92,252,.07);
      animation: slideUp .45s ease; position: relative;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px; display: grid; place-items: center; font-size: 20px;
    }
    .logo-text { font-size: 20px; font-weight: 700; }
    .tagline { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #a0aec0; }
    input, select {
      width: 100%; padding: 11px 14px;
      background: #1c2030; border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: inherit; font-size: 14px;
      transition: border-color .2s, box-shadow .2s; outline: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,.15);
    }
    input::placeholder { color: var(--muted); }
    select option { background: #1c2030; }

    /* Password strength bar */
    .strength-bar { height: 4px; border-radius: 2px; margin-top: 8px; background: var(--border); overflow: hidden; }
    .strength-fill { height: 100%; width: 0; transition: width .3s, background .3s; border-radius: 2px; }
    .strength-label { font-size: 11px; margin-top: 4px; color: var(--muted); }

    .btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius);
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .1s; margin-top: 8px;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .alert {
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .alert.error   { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--error); display: block; }
    .alert.success { background: rgba(74,222,128,.1);  border: 1px solid rgba(74,222,128,.3);  color: var(--success); display: block; }
    .link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .link a:hover { text-decoration: underline; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <span class="logo-text">ChatBot</span>
  </div>
  <p class="tagline">Create your account to get started</p>
  <h2>Create Account</h2>

  <div id="alert" class="alert"></div>

  <div class="field">
    <label>Username</label>
    <input id="username" type="text" placeholder="Choose a username (min 3 chars)" autocomplete="username"/>
    <p class="hint">3–50 characters, no spaces</p>
  </div>
  <div class="field">
    <label>Email Address</label>
    <input id="email" type="email" placeholder="your@email.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input id="password" type="password" placeholder="At least 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <p class="strength-label" id="strengthLabel">Enter a password</p>
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input id="confirm" type="password" placeholder="Repeat your password" autocomplete="new-password"/>
  </div>
  <div class="field">
    <label>Preferred Language</label>
    <select id="language">
      <option value="en">🇺🇸 English</option>
      <option value="hi">🇮🇳 Hindi (हिन्दी)</option>
    </select>
  </div>

  <button class="btn" id="regBtn" onclick="register()">Create Account</button>
  <p class="link">Already have an account? <a href="login.html">Sign in</a></p>
</div>

<script>
  const API = 'http://localhost:8000';

  if (localStorage.getItem('token')) {
    window.location.href = 'chat.html';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });

  function checkStrength(val) {
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const colors = ['#f87171','#fb923c','#facc15','#4ade80','#22c55e'];
    const labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
    fill.style.width  = `${score * 20}%`;
    fill.style.background = colors[score - 1] || '#3f3f46';
    label.textContent = score ? labels[score - 1] : 'Enter a password';
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type}`;
  }

  async function register() {
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const language = document.getElementById('language').value;
    const btn      = document.getElementById('regBtn');

    if (!username || !email || !password || !confirm) {
      showAlert('Please fill in all fields.', 'error'); return;
    }
    if (username.length < 3) {
      showAlert('Username must be at least 3 characters.', 'error'); return;
    }
    if (password.length < 6) {
      showAlert('Password must be at least 6 characters.', 'error'); return;
    }
    if (password !== confirm) {
      showAlert('Passwords do not match.', 'error'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating account…';

    try {
      const res = await fetch(`${API}/auth/register`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ username, email, password, language }),
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert(data.detail || 'Registration failed.', 'error'); return;
      }

      showAlert('Account created! Redirecting to login…', 'success');
      setTimeout(() => window.location.href = 'login.html', 1200);
    } catch {
      showAlert('Cannot connect to server.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  }
</script>
</body>
</html>
