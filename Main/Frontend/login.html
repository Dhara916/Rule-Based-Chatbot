<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatBot – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & variables ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --border: #252a35;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --text: #e8eaf0;
      --muted: #6b7280;
      --error: #f87171;
      --success: #4ade80;
      --radius: 12px;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    /* animated gradient background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(79,142,247,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(124,92,252,.10) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Card ──────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 0 0 60px rgba(79,142,247,.07);
      animation: slideUp .45s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* top glow line */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 4px;
    }

    /* ── Logo ──────────────────────────────────────────────── */
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 20px;
    }
    .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
    .tagline { color: var(--muted); font-size: 13px; margin-bottom: 32px; }

    /* ── Form ──────────────────────────────────────────────── */
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #a0aec0; }

    input {
      width: 100%;
      padding: 11px 14px;
      background: #1c2030;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,.15);
    }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius);
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .1s;
      margin-top: 4px;
    }
    .btn:hover  { opacity: .9; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert.error   { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--error); display: block; }
    .alert.success { background: rgba(74,222,128,.1);  border: 1px solid rgba(74,222,128,.3);  color: var(--success); display: block; }

    .link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .link a:hover { text-decoration: underline; }

    /* spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <span class="logo-text">ChatBot</span>
  </div>
  <p class="tagline">Your Friendly Chat Companion</p>

  <h2>Welcome back</h2>

  <div id="alert" class="alert"></div>

  <div class="field">
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="Enter your username" autocomplete="username"/>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password"/>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Sign In</button>

  <p class="link">Don't have an account? <a href="register.html">Register here</a></p>
</div>

<script>
  const API = 'http://localhost:8000';

  // If already logged in, redirect
  if (localStorage.getItem('token')) {
    window.location.href = localStorage.getItem('role') === 'admin'
      ? 'dashboard.html' : 'chat.html';
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type}`;
  }

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');

    if (!username || !password) {
      showAlert('Please fill in all fields.', 'error'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert(data.detail || 'Login failed.', 'error');
        return;
      }

      // Persist token and user info
      localStorage.setItem('token',    data.access_token);
      localStorage.setItem('role',     data.role);
      localStorage.setItem('username', data.username);

      showAlert('Login successful! Redirecting…', 'success');
      setTimeout(() => {
        window.location.href = data.role === 'admin' ? 'dashboard.html' : 'chat.html';
      }, 700);

    } catch (err) {
      showAlert('Cannot connect to server. Is the backend running?', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }
</script>
</body>
</html>
